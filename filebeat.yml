filebeat.autodiscover:
  providers:
    - type: docker
      templates:
        - condition:
            contains:
              docker.container.name: v2fly
          config:
            - type: container
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log

        - condition:
            contains:
              docker.container.name: hysteria
          config:
            - type: container
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log

output.elasticsearch:
  hosts: "${ELASTICSEARCH_HOSTS}"
  ssl.verification_mode: none
  username: "${ELASTICSEARCH_USERNAME}"
  password: "${ELASTICSEARCH_PASSWORD}"
  index: "proxy-access-%{+yyyyMM}"
  pipelines:
    - pipeline: "hysteria-log"
      when.contains:
        container.name: "hysteria"
    - pipeline: "v2fly-log"
      when.contains:
        container.name: "v2fly"

setup.template.enabled: false

setup.ilm.enabled: false

# logging.level: debug
