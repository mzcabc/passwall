services:
  kv:
    container_name: kv
    image: ghcr.io/mzcabc/docker-cloudflare-kv:main
    volumes:
      - ./kv:/kv
    environment:
      - AUTH=${KV_AUTH}
      - ACCOUNT_ID=${KV_ACCOUNT_ID}
      - NAMESPACE_ID=${KV_NAMESPACE_ID}
      - KEY_NAME=${KV_KEY_NAME}
      - OUTPUT_FILE=users.json

  setup:
    container_name: setup
    depends_on:
      kv:
        condition: service_completed_successfully
    image: alpine
    command: /bin/ash /conf_gen.sh
    volumes:
      - ./kv/users.json:/users.json
      - ./v2ray-server.json:/v2ray-server.json
      - ./conf_gen.sh:/conf_gen.sh
      - conf:/conf

  v2fly:
    container_name: v2fly
    depends_on:
      setup:
        condition: service_completed_successfully
    image: v2fly/v2fly-core
    restart: always
    volumes:
      - conf:/conf
    command: run -c /conf/v2ray-server.json
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "100m"
    environment:
      TZ: Asia/Shanghai

  caddy:
    container_name: caddy
    image: caddy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/$${DOMAIN}/$${DOMAIN}.crt"]
      interval: 5s
      timeout: 3s
      retries: 60
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy:/data/caddy
    ports:
      - 80:80
      - 443:443
    environment:
      - DOMAIN=${DOMAIN}
    logging:
      driver: "local"

  hysteria:
    image: tobyxdd/hysteria
    container_name: hysteria
    restart: always
    depends_on:
      caddy:
        condition: service_healthy
    ports:
      - 443:443/udp
    volumes:
      - ./hysteria.yml:/etc/hysteria.yml
      - ./caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.crt:/certs/cert.crt:ro
      - ./caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.key:/certs/cert.key:ro
    command: ["server", "-c", "/etc/hysteria.yml"]
    environment:
      HYSTERIA_LOG_FORMAT: json
      TZ: Asia/Shanghai

  filebeat:
    container_name: filebeat
    hostname: ${HOSTNAME}
    user: root
    image: docker.elastic.co/beats/filebeat:${FILEBEAT_VERSION}
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 200M
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "100m"
    restart: unless-stopped
    command:
      - "-e"
    environment:
      - TZ=Asia/Shanghai
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  conf:
    driver: local
