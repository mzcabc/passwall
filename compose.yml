services:
  kv:
    container_name: kv
    image: ghcr.io/mzcabc/docker-cloudflare-kv:main
    volumes:
      - ./kv:/kv
    environment:
      - AUTH=${KV_AUTH}
      - ACCOUNT_ID=${KV_ACCOUNT_ID}
      - NAMESPACE_ID=${KV_NAMESPACE_ID}
      - KEY_NAME=${KV_KEY_NAME}
      - OUTPUT_FILE=users.json

  setup:
    container_name: setup
    depends_on:
      kv:
        condition: service_completed_successfully
    image: alpine
    command: /bin/ash /conf_gen.sh
    volumes:
      - ./kv/users.json:/users.json
      - ./v2ray.tmpl.json:/v2ray.tmpl.json
      - ./hysteria.tmpl.yml:/hysteria.tmpl.yml
      - ./anytls.tmpl.json:/anytls.tmpl.json
      - ./conf_gen.sh:/conf_gen.sh
      - conf:/conf
    environment:
      - HYSTERIA_API_SECRET=${HYSTERIA_API_SECRET}

  v2fly:
    container_name: v2fly
    depends_on:
      setup:
        condition: service_completed_successfully
    image: v2fly/v2fly-core
    restart: always
    volumes:
      - conf:/conf
    command: run -c /conf/v2ray.json
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "100m"
    environment:
      TZ: Asia/Shanghai

  caddy:
    container_name: caddy
    image: caddy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/$${DOMAIN}/$${DOMAIN}.crt"]
      interval: 5s
      timeout: 3s
      retries: 60
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy:/data/caddy
    ports:
      - 80:80
      - 443:443
    environment:
      - DOMAIN=${DOMAIN}
    logging:
      driver: "local"

  hysteria:
    container_name: hysteria
    image: tobyxdd/hysteria
    restart: always
    depends_on:
      caddy:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    ports:
      - 443:443/udp
    volumes:
      - conf:/conf
      - hysteria-log:/var/log/hysteria
      - ./caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.crt:/certs/cert.crt:ro
      - ./caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.key:/certs/cert.key:ro
    entrypoint: ["sh", "-c"]
    command: ["hysteria server -c /conf/hysteria.yml 2>&1 | tee /var/log/hysteria/server.log"]
    environment:
      HYSTERIA_LOG_FORMAT: json
      TZ: Asia/Shanghai

  hysteria-access:
    container_name: hysteria-access
    image: python:3.13-alpine
    restart: always
    depends_on:
      - hysteria
    environment:
      HYSTERIA_API_SECRET: ${HYSTERIA_API_SECRET}
      POLL_INTERVAL: "1"
      NODE_NAME: ${HOSTNAME}
    volumes:
      - ./hysteria-access.py:/hysteria-access.py:ro
      - hysteria-log:/var/log/hysteria:ro
    command: ["python", "-u", "/hysteria-access.py"]

  anytls:
    container_name: anytls
    image: ghcr.io/sagernet/sing-box@sha256:c8b67944345dc84a226b648a71f854818606eae0813c4e6a452f192ef821b5b8
    restart: always
    depends_on:
      caddy:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    ports:
      - "${ANYTLS_PORT:-8443}:8443/tcp"
    volumes:
      - conf:/conf:ro
      - anytls-log:/var/log/sing-box
      - ./caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.crt:/certs/cert.crt:ro
      - ./caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.key:/certs/cert.key:ro
    command: ["--disable-color", "run", "-c", "/conf/anytls.json"]
    environment:
      TZ: Asia/Shanghai

  anytls-access:
    container_name: anytls-access
    image: python:3.13-alpine
    restart: always
    depends_on:
      - anytls
    volumes:
      - ./anytls-access.py:/anytls-access.py:ro
      - anytls-log:/var/log/sing-box:ro
    command: ["python", "-u", "/anytls-access.py"]

  snell:
    container_name: snell
    build:
      context: .
      dockerfile: Dockerfile.snell
    restart: always
    ports:
      - "${SNELL_PORT:-38458}:${SNELL_PORT:-38458}/tcp"
      - "${SNELL_PORT:-38458}:${SNELL_PORT:-38458}/udp"
    environment:
      SNELL_LISTEN: "0.0.0.0:${SNELL_PORT:-38458}"
      SNELL_PSK: ${SNELL_PSK}
      SNELL_IPV6: "false"

  filebeat:
    container_name: filebeat
    hostname: ${HOSTNAME}
    user: root
    image: docker.elastic.co/beats/filebeat:${FILEBEAT_VERSION}
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 200M
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "100m"
    restart: unless-stopped
    command:
      - "-e"
    environment:
      - TZ=Asia/Shanghai
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  conf:
    driver: local
  hysteria-log:
  anytls-log:
